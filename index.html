<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobalt Downloader</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c6af7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4'/><polyline points='7 10 12 15 17 10'/><line x1='12' y1='15' x2='12' y2='3'/></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e; --border: #2e2e3e;
    --accent: #7c6af7; --accent-dim: #5a4fd4; --text: #e8e8f0; --text-muted: #888899;
    --success: #4caf82; --error: #e05a6a; --warning: #e0a94a;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header span { font-size: 0.75rem; color: var(--text-muted); background: var(--surface2); padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); }
  main { flex: 1; max-width: 860px; width: 100%; margin: 0 auto; padding: 2rem 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .url-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  input[type="text"] { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.65rem 1rem; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-muted); }
  .options-row { display: flex; gap: 10px; flex-wrap: wrap; }
  select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.85rem; outline: none; cursor: pointer; }
  button { background: var(--accent); color: #fff; border: none; padding: 0.65rem 1.4rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  button:hover { background: var(--accent-dim); }
  button.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  button.secondary:hover { background: var(--border); }
  #queue { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
  .queue-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 6px; animation: fadeIn 0.2s ease; }
  .queue-row { display: flex; align-items: center; gap: 12px; }
  .progress-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; position: relative; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; position: absolute; left: 0; top: 0; }
  .progress-bar.indeterminate { width: 35%; animation: progress-slide 1.2s linear infinite; }
  @keyframes progress-slide { 0% { left: -35%; } 100% { left: 100%; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .item-url { flex: 1; font-size: 0.82rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-status { font-size: 0.78rem; padding: 2px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .item-status.pending    { background: #2e2e3e; color: var(--text-muted); }
  .item-status.running    { background: #1e2a4a; color: #7aabf7; }
  .item-status.done       { background: #1a3028; color: var(--success); }
  .item-status.error      { background: #3a1a1e; color: var(--error); }
  .item-status.picker     { background: #2e2518; color: var(--warning); }
  .item-status.cancelled  { background: #2a1f2e; color: var(--text-muted); }
  .item-filename { font-size: 0.82rem; color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 500; }
  button.ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 0.25rem 0.75rem; font-size: 0.75rem; border-radius: 6px; }
  button.ghost:hover { background: var(--surface2); color: var(--text); }
  #history-list { display: flex; flex-direction: column; gap: 6px; }
  .hist-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
  .hist-icon { font-size: 0.8rem; flex-shrink: 0; width: 16px; text-align: center; }
  .hist-icon.done { color: var(--success); }
  .hist-icon.error { color: var(--error); }
  .hist-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); font-size: 0.78rem; min-width: 0; }
  .hist-filename { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; flex-shrink: 0; }
  .hist-meta { color: var(--text-muted); font-size: 0.75rem; flex-shrink: 0; white-space: nowrap; }
  .hist-remove { background: none; border: none; color: var(--text-muted); font-size: 1rem; line-height: 1; padding: 0 0 0 4px; cursor: pointer; flex-shrink: 0; }
  .hist-remove:hover { color: var(--error); }
  .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  .retry-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 2px 10px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; flex-shrink: 0; white-space: nowrap; }
  .retry-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cancel-btn { background: none; border: none; color: var(--text-muted); font-size: 0.85rem; cursor: pointer; padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .cancel-btn:hover { color: var(--error); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .picker-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .picker-modal.hidden { display: none; }
  .picker-inner { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; max-width: 480px; width: 100%; }
  .picker-inner h3 { margin-bottom: 1rem; font-size: 1rem; }
  .picker-items { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; margin-bottom: 1rem; }
  .picker-item { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem; cursor: pointer; font-size: 0.85rem; transition: border-color 0.15s; }
  .picker-item:hover { border-color: var(--accent); }
  .picker-item img { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  footer { border-top: 1px solid var(--border); padding: 0.85rem 2rem; display: flex; align-items: center; justify-content: center; gap: 1.5rem; }
  footer span { font-size: 0.75rem; color: var(--text-muted); }
  footer span b { color: var(--text); font-weight: 500; }
  .settings-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 5px 12px; border-radius: 6px; line-height: 1; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
  .settings-btn:hover { color: var(--text); background: var(--surface2); }
  .settings-section { margin-bottom: 1.25rem; }
  .settings-label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; font-weight: 500; }
  .rule-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .rule-row input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.75rem; border-radius: 6px; font-size: 0.85rem; outline: none; min-width: 0; }
  .rule-row input:focus { border-color: var(--accent); }
  .rule-domain { flex: 1; }
  .rule-dir { flex: 2; }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <h1>Cobalt Downloader</h1>
  </div>
</header>
<main>
  <div class="card">
    <div class="url-row">
      <input type="text" id="url-input" placeholder="Paste a URL" />
      <button onclick="queueDownload()">Download</button>
    </div>
    <div class="options-row">
      <select id="mode">
        <option value="auto">Auto (video + audio)</option>
        <option value="audio">Audio only</option>
        <option value="mute">Video only (no audio)</option>
      </select>
      <select id="quality">
        <option value="1080">1080p</option>
        <option value="720">720p</option>
        <option value="480">480p</option>
        <option value="360">360p</option>
        <option value="max">Max quality</option>
      </select>
      <select id="audio-fmt">
        <option value="mp3">MP3</option>
        <option value="ogg">OGG</option>
        <option value="wav">WAV</option>
        <option value="opus">Opus</option>
        <option value="best">Best</option>
      </select>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:0.75rem">
      <button class="settings-btn" onclick="openSettings()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </button>
    </div>
  </div>
  <div id="queue"></div>
  <div id="history-section" style="display:none">
    <div class="section-header">
      <div class="section-title">History</div>
      <button class="ghost" onclick="clearHistory()">Clear all</button>
    </div>
    <div id="history-list"></div>
  </div>
  <div id="history-empty" class="empty-state" style="display:none">No download history yet.</div>
</main>
<footer>
  <span>cobalt-ui <b>v0.0.1</b></span>
  <span>cobalt api <b id="cobalt-version">—</b></span>
  <span id="cookie-expiry" style="display:none">X.com cookies expire <b id="cookie-expiry-date">—</b></span>
  <a href="https://cobalt.tools" target="_blank" style="font-size:0.75rem;color:var(--text-muted);text-decoration:none;">powered by cobalt</a>
</footer>
<div id="settings-modal" class="picker-modal hidden">
  <div class="picker-inner" style="max-width:580px">
    <h3>Settings</h3>
    <div class="settings-section">
      <label class="settings-label">Default download folder</label>
      <input type="text" id="set-default-dir" placeholder="/media/downloads/cobalt" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.5rem 0.75rem;border-radius:6px;font-size:0.85rem;outline:none;">
    </div>
    <div class="settings-section">
      <label class="settings-label">Folder rules — domain → folder</label>
      <div id="set-rules"></div>
      <button class="secondary" onclick="addRule()" style="margin-top:8px;font-size:0.8rem;padding:0.35rem 0.8rem">+ Add rule</button>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:0.5rem">
      <button class="secondary" onclick="closeSettings()">Cancel</button>
      <button onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>
<div id="picker-modal" class="picker-modal hidden">
  <div class="picker-inner">
    <h3>Multiple items found — pick one</h3>
    <div id="picker-items" class="picker-items"></div>
    <button class="secondary" onclick="closePicker()">Cancel</button>
  </div>
</div>
<div id="cancel-modal" class="picker-modal hidden">
  <div class="picker-inner" style="max-width:400px">
    <h3>Stop this download?</h3>
    <p style="font-size:0.88rem;color:var(--text-muted);margin-bottom:1.25rem">What would you like to do with the partial file?</p>
    <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;">
      <button class="secondary" onclick="closeCancelModal()">Keep going</button>
      <button class="secondary" onclick="confirmCancel(false)">Stop, keep file</button>
      <button style="background:var(--error);" onclick="confirmCancel(true)">Stop &amp; delete file</button>
    </div>
  </div>
</div>
<script>
let pickerContext = null;

async function checkStatus() {
  try {
    const d = await (await fetch('/api/status')).json();
    if (d.cobalt?.cobalt?.version) {
      document.getElementById('cobalt-version').textContent = 'v' + d.cobalt.cobalt.version;
    }
    if (d.cookieExpiry) {
      const [dd, mm, yyyy] = d.cookieExpiry.split('/');
      const expiry = new Date(`${yyyy}-${mm}-${dd}`);
      const daysLeft = Math.ceil((expiry - Date.now()) / (1000 * 60 * 60 * 24));
      const el = document.getElementById('cookie-expiry');
      const dateEl = document.getElementById('cookie-expiry-date');
      dateEl.textContent = `${dd}/${mm}/${yyyy} (${daysLeft} days)`;
      el.style.display = 'inline';
      if (daysLeft <= 7) { dateEl.style.color = 'var(--error)'; }
      else if (daysLeft <= 30) { dateEl.style.color = 'var(--warning)'; }
      else { dateEl.style.color = 'var(--success)'; }
    }
  } catch { /* cobalt api offline */ }
}

async function loadHistory() {
  try {
    const entries = await (await fetch('/api/history')).json();
    const section = document.getElementById('history-section');
    const empty = document.getElementById('history-empty');
    const list = document.getElementById('history-list');
    if (!entries.length) { section.style.display='none'; empty.style.display='block'; return; }
    section.style.display='block'; empty.style.display='none';
    list.innerHTML = entries.map(e => {
      const isDone = e.status === 'done';
      const meta = [e.size ? fmtSize(e.size) : null, fmtDate(e.date)].filter(Boolean).join(' · ');
      return `<div class="hist-row" id="hr-${e.id}">
        <span class="hist-icon ${e.status}">${isDone ? '✓' : '✗'}</span>
        <span class="hist-url" title="${e.url}">${e.url}</span>
        ${isDone && e.filename ? `<span class="hist-filename" title="${e.filename}">${e.filename}</span>` : (e.error ? `<span class="hist-filename" style="color:var(--error);font-size:0.75rem" title="${e.error}">${e.error}</span>` : '')}
        <span class="hist-meta">${meta}</span>
        <button class="hist-remove" onclick="removeHistory('${e.id}')" title="Remove">×</button>
      </div>`;
    }).join('');
  } catch {}
}

async function removeHistory(id) {
  document.getElementById('hr-' + id)?.remove();
  await fetch('/api/history/' + id, { method: 'DELETE' });
  const list = document.getElementById('history-list');
  if (!list.children.length) {
    document.getElementById('history-section').style.display = 'none';
    document.getElementById('history-empty').style.display = 'block';
  }
}

async function clearHistory() {
  await fetch('/api/history', { method: 'DELETE' });
  document.getElementById('history-section').style.display = 'none';
  document.getElementById('history-empty').style.display = 'block';
  document.getElementById('history-list').innerHTML = '';
}

function fmtSize(b) { if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(1)+' KB'; if(b<1073741824) return (b/1048576).toFixed(1)+' MB'; return (b/1073741824).toFixed(2)+' GB'; }
function fmtDate(d) { return new Date(d).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }

function addQueueItem(url, id) {
  const el = document.createElement('div');
  el.className = 'queue-item'; el.id = 'qi-' + id;
  el.dataset.url = url;
  el.innerHTML = `
    <div class="queue-row">
      <div class="spinner" id="spin-${id}"></div>
      <div class="item-url" title="${url}">${url}</div>
      <div class="item-filename" id="fn-${id}"></div>
      <div class="item-status running" id="st-${id}">Contacting…</div>
      <button class="cancel-btn" id="cancel-${id}" style="display:none" onclick="requestCancel(${id})" title="Cancel download">✕</button>
      <button class="retry-btn" id="retry-${id}" style="display:none" onclick="retryDownload(${id})">↺ Retry</button>
    </div>
    <div class="progress-wrap" id="pw-${id}" style="display:none">
      <div class="progress-bar" id="pb-${id}"></div>
    </div>`;
  document.getElementById('queue').prepend(el);
}

function updateItem(id, status, label, filename, showRetry, percent) {
  const st=document.getElementById('st-'+id), spin=document.getElementById('spin-'+id),
        fn=document.getElementById('fn-'+id), rb=document.getElementById('retry-'+id),
        cb=document.getElementById('cancel-'+id),
        pw=document.getElementById('pw-'+id), pb=document.getElementById('pb-'+id);
  if(st){st.className='item-status '+status; st.textContent=label;}
  if(spin) spin.style.display=status==='running'?'block':'none';
  if(fn&&filename) fn.textContent=filename;
  if(rb) rb.style.display=showRetry?'inline-block':'none';
  if(cb) cb.style.display=status==='running'?'inline-block':'none';
  if(pw&&pb) {
    if(status==='running' && percent!==undefined) {
      pw.style.display='block';
      const pct=parseFloat(percent);
      if(isNaN(pct)) { pb.className='progress-bar indeterminate'; pb.style.width='35%'; }
      else { pb.className='progress-bar'; pb.style.width=Math.min(100,pct)+'%'; }
    } else {
      pw.style.display='none';
    }
  }
}

async function retryDownload(id) {
  const el = document.getElementById('qi-' + id);
  if (!el) return;
  const url = el.dataset.url;
  const mode=document.getElementById('mode').value, quality=document.getElementById('quality').value, audioFmt=document.getElementById('audio-fmt').value;
  updateItem(id, 'running', 'Retrying…', null, false);
  try {
    const data = await (await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, downloadMode: mode, videoQuality: quality, audioFormat: audioFmt }),
    })).json();
    if (data.error) { updateItem(id,'error',data.error,null,true); return; }
    if (data.status === 'ytdlp' || data.status === 'cobalt-job') { trackJob(data.jobId, id); return; }
    if (data.status === 'picker') { updateItem(id,'picker','Choose item',null,false); document.getElementById('spin-'+id).style.display='none'; showPicker(data.picker, id, url); return; }
    updateItem(id, 'done', '✓ Saved', data.filename);
    loadHistory();
  } catch(e) { updateItem(id,'error',e.message,null,true); }
}

async function queueDownload() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  const mode=document.getElementById('mode').value, quality=document.getElementById('quality').value, audioFmt=document.getElementById('audio-fmt').value;
  document.getElementById('url-input').value = '';
  const id = Date.now();
  addQueueItem(url, id);
  try {
    const data = await (await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, downloadMode: mode, videoQuality: quality, audioFormat: audioFmt }),
    })).json();
    if (data.error) { updateItem(id,'error',data.error,null,true); return; }
    if (data.status === 'ytdlp' || data.status === 'cobalt-job') { trackJob(data.jobId, id); return; }
    if (data.status === 'picker') { updateItem(id,'picker','Choose item'); document.getElementById('spin-'+id).style.display='none'; showPicker(data.picker, id, url); return; }
    updateItem(id, 'done', '✓ Saved', data.filename);
    loadHistory();
  } catch(e) { updateItem(id,'error',e.message,null,true); }
}

// Track a server-side job (yt-dlp or cobalt) via Server-Sent Events
function trackJob(jobId, queueId, attempt = 0) {
  if (attempt === 0) {
    updateItem(queueId, 'running', 'Starting…', null, false, null);
    const el = document.getElementById('qi-' + queueId);
    if (el) el.dataset.jobId = jobId;
  }
  const es = new EventSource('/api/progress/' + jobId);

  es.onmessage = (e) => {
    let job;
    try { job = JSON.parse(e.data); } catch { return; }

    if (job.status === 'starting') {
      updateItem(queueId, 'running', 'Starting…', null, false, null);
    } else if (job.status === 'downloading') {
      const pct = parseFloat(job.percent);
      const parts = [];
      if (!isNaN(pct)) parts.push(pct.toFixed(1) + '%');
      if (job.speed && job.speed !== 'NA') parts.push(job.speed);
      if (job.eta && job.eta !== 'NA' && job.eta !== 'Unknown') parts.push('ETA ' + job.eta);
      updateItem(queueId, 'running', parts.join(' • ') || 'Downloading…', job.filename, false, job.percent);
    } else if (job.status === 'done') {
      updateItem(queueId, 'done', '✓ Saved', job.filename);
      loadHistory();
      es.close();
    } else if (job.status === 'error') {
      updateItem(queueId, 'error', job.error || 'Download failed', null, true);
      es.close();
    } else if (job.status === 'cancelled') {
      es.close();
      // UI already updated by confirmCancel; this just closes the stream
    }
  };

  es.onerror = () => {
    es.close();
    const MAX = 3;
    if (attempt < MAX) {
      updateItem(queueId, 'running', `Reconnecting… (${attempt + 1}/${MAX})`);
      setTimeout(() => trackJob(jobId, queueId, attempt + 1), 2000);
    } else {
      updateItem(queueId, 'error', 'Lost connection to progress stream', null, true);
    }
  };
}

function showPicker(items, queueId, originalUrl) {
  pickerContext = { queueId, originalUrl }; window._pickerItems = items;
  document.getElementById('picker-items').innerHTML = items.map((item,i) =>
    `<div class="picker-item" onclick="pickItem(${i})">${item.thumb?`<img src="${item.thumb}" alt="">`:''}<span>${item.type||'Item'} ${i+1}</span></div>`
  ).join('');
  document.getElementById('picker-modal').classList.remove('hidden');
}

async function pickItem(index) {
  closePicker();
  const item = window._pickerItems[index], { queueId, originalUrl } = pickerContext;
  updateItem(queueId, 'running', 'Downloading…');
  try {
    const filename = `pick_${Date.now()}_${index+1}.${item.type==='photo'?'jpg':'mp4'}`;
    const data = await (await fetch('/api/download-url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: item.url, filename, originalUrl }),
    })).json();
    if (data.error) { updateItem(queueId,'error',data.error,null,true); return; }
    if (data.status === 'cobalt-job') { trackJob(data.jobId, queueId); return; }
    updateItem(queueId, 'done', '✓ Saved', data.filename);
    loadHistory();
  } catch(e) { updateItem(queueId,'error',e.message); }
}

function closePicker() { document.getElementById('picker-modal').classList.add('hidden'); }

// --- Cancel -----------------------------------------------------------------
let cancelContext = null;

function requestCancel(queueId) {
  const el = document.getElementById('qi-' + queueId);
  const jobId = el?.dataset.jobId;
  if (!jobId) return;
  cancelContext = { jobId, queueId };
  document.getElementById('cancel-modal').classList.remove('hidden');
}

function closeCancelModal() {
  document.getElementById('cancel-modal').classList.add('hidden');
  cancelContext = null;
}

async function confirmCancel(deleteFile) {
  if (!cancelContext) return;
  const { jobId, queueId } = cancelContext;
  closeCancelModal();
  // Update UI immediately so the user sees feedback before the server round-trip
  updateItem(queueId, 'cancelled', 'Cancelled', null, !deleteFile);
  try {
    await fetch('/api/job/' + jobId + '?deleteFile=' + deleteFile, { method: 'DELETE' });
  } catch {}
  if (!deleteFile) loadHistory();
}

// --- Settings ---------------------------------------------------------------
let settingsData = { defaultDir: '', rules: [] };

async function loadSettingsData() {
  try { settingsData = await (await fetch('/api/settings')).json(); } catch {}
}

function openSettings() {
  document.getElementById('set-default-dir').value = settingsData.defaultDir || '';
  renderRules(settingsData.rules || []);
  document.getElementById('settings-modal').classList.remove('hidden');
}

function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

function renderRules(rules) {
  document.getElementById('set-rules').innerHTML = rules.map(r => ruleRowHtml(r.domain, r.dir)).join('');
}

function ruleRowHtml(domain, dir) {
  return `<div class="rule-row">
    <input type="text" class="rule-domain" value="${domain || ''}" placeholder="youtube.com">
    <span style="color:var(--text-muted);flex-shrink:0">→</span>
    <input type="text" class="rule-dir" value="${dir || ''}" placeholder="/downloads/youtube">
    <button onclick="this.closest('.rule-row').remove()" class="hist-remove" title="Remove">×</button>
  </div>`;
}

function addRule() {
  document.getElementById('set-rules').insertAdjacentHTML('beforeend', ruleRowHtml('', ''));
}

async function saveSettings() {
  const defaultDir = document.getElementById('set-default-dir').value.trim();
  const rules = [...document.querySelectorAll('#set-rules .rule-row')].map(row => ({
    domain: row.querySelector('.rule-domain').value.trim(),
    dir: row.querySelector('.rule-dir').value.trim(),
  })).filter(r => r.domain && r.dir);
  settingsData = { defaultDir, rules };
  await fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(settingsData) });
  closeSettings();
}
// ---------------------------------------------------------------------------

document.getElementById('url-input').addEventListener('keydown', e => { if(e.key==='Enter') queueDownload(); });
checkStatus(); loadHistory(); loadSettingsData();
setInterval(checkStatus, 30000); setInterval(loadHistory, 10000);
</script>
